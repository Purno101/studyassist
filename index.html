<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>|Study Assist|</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>
    <!-- Main Container -->
    <div class="app-container">
        
        <!-- Header -->
        <div class="header">
            <h1>⚡ STUDY REPORT ⚡</h1>
        </div>

        <!-- Stats Section (always visible) -->
        <div class="stats">
            <div class="stats-row">
                <div class="stat-item">
                    <span class="stat-label">Progress</span>
                    <span class="stat-value" id="pp">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">XP</span>
                    <span class="stat-value" id="xp">0</span>
                </div>
                <div class="stat-item streak">
                    <span class="stat-label">🔥 Streak</span>
                    <span class="stat-value" id="streak">0</span>
                </div>
            </div>
            
            <!-- Level badge moved ABOVE progress bar -->
            <div class="level-badge">
                Level <span id="level">1</span>
            </div>
            
            <div class="progress-container">
                <div class="bar">
                    <div id="progress"></div>
                </div>
            </div>

            <div class="xp-container">
                <div class="xpBar">
                    <div id="xpProgress"></div>
                </div>
                <div class="xp-text" id="xpText">0 / 50 XP</div>
            </div>
        </div>

        <!-- Boss Box (conditionally visible) -->
        <div id="bossBox" class="boss-box"></div>

                <span>ACHIEVEMENTS</span>
            </button>
        </div>

        <!-- Panels Container -->
        <div class="panels-container">
            <!-- HOME Panel -->
            <div class="panel active" id="home-panel">
                <div class="taskInput">
                    <div class="input-group">
                        <select id="subject">
                            <option value="">Subject</option>
                            <option>Physics</option>
                            <option>Chemistry</option>
                            <option>Mathematics</option>
                            <option>Biology</option>
                            <option>ICT</option>
                            <option>Bangla</option>
                            <option>English</option>
                        </select>

                        <select id="difficulty">
                            <option value="">Difficulty</option>
                            <option value="easy">Easy</option>
                            <option value="medium">Medium</option>
                            <option value="hard">Hard</option>
                        </select>
                    </div>
                    
                    <div class="input-group">
                        <input id="taskText" placeholder="Topic / Description">

                        <button onclick="addTask()" class="add-task-btn">
                            <svg viewBox="0 0 24 24" width="18" height="18">
                                <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2"/>
                            </svg>
                            Add Task
                        </button>
                    </div>
                </div>

                <div id="reward" class="reward-message"></div>
                <div id="taskList" class="task-list"></div>
            </div>

            <!-- HISTORY Panel -->
            <div class="panel" id="history-panel">
                <div class="panel-header">
                    <h2>📚 Study History</h2>
                </div>
                <div id="historyList" class="history-list"></div>
            </div>

            <!-- ACHIEVEMENTS Panel -->
            <div class="panel" id="achievements-panel">
                <div class="panel-header">
                    <h2>🏆 Achievements</h2>
                </div>
                <div id="achievementsList" class="achievements-grid"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
